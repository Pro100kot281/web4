<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        #image {
            width: 100%;
            height: 400px;
            background-color: #f0f0f0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: #666;
            text-align: center;
            padding: 20px;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }

        .preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .preview {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 3px solid transparent;
        }

        .preview:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border-color: #667eea;
        }

        .instructions {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            color: #495057;
            font-size: 1.1em;
            border-left: 4px solid #667eea;
        }

        .instructions p {
            margin: 5px 0;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Image Gallery Preview</h1>
        
        <div class="instructions">
            <p>✨ Hover over any image below to see it displayed here</p>
            <p>👆 The preview area shows the image and its description</p>
            <p>🔄 Move mouse away to return to default view</p>
        </div>

        <div id="image">Hover over an image below to display here.</div>

        <div class="preview-container">
            <img class="preview" src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=300&h=200&fit=crop" alt="Beautiful mountain landscape with snow peaks" onmouseover="upDate(this)" onmouseout="undo()">
            
            <img class="preview" src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=300&h=200&fit=crop" alt="Misty morning in dense forest with sun rays" onmouseover="upDate(this)" onmouseout="undo()">
            
            <img class="preview" src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=300&h=200&fit=crop" alt="Sunlight filtering through green forest canopy" onmouseover="upDate(this)" onmouseout="undo()">
            
            <img class="preview" src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=300&h=200&fit=crop" alt="Colorful sunset over mountain range" onmouseover="upDate(this)" onmouseout="undo()">
            
            <img class="preview" src="https://images.unsplash.com/photo-1511497584788-876760111969?w=300&h=200&fit=crop" alt="Peaceful lake surrounded by autumn forest" onmouseover="upDate(this)" onmouseout="undo()">
        </div>

        <footer>
            <p>Hover over images to preview | Built with JavaScript DOM manipulation</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
