<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nature Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <h1>Nature Gallery</h1>
    <p>Simple responsive layout with accessibility support</p>
  </header>

  <main class="grid">

    <figure>
      <img src="https://picsum.photos/400/300?n1" alt="Green hills and blue sky">
      <figcaption>Green hills under a clear blue sky.</figcaption>
    </figure>

    <figure>
      <img src="https://picsum.photos/400/300?n2" alt="River in the forest">
      <figcaption>A calm river flowing through the forest.</figcaption>
    </figure>

    <figure>
      <img src="https://picsum.photos/400/300?n3" alt="Sunset over mountains">
      <figcaption>Sunset colors over distant mountains.</figcaption>
    </figure>

    <figure>
      <img src="https://picsum.photos/400/300?n4" alt="Lake with reflections">
      <figcaption>Clear lake reflecting the sky.</figcaption>
    </figure>

    <figure>
      <img src="https://picsum.photos/400/300?n5" alt="Snowy forest">
      <figcaption>Winter forest covered in snow.</figcaption>
    </figure>

    <figure>
      <img src="https://picsum.photos/400/300?n6" alt="Desert landscape">
      <figcaption>Warm desert landscape with dunes.</figcaption>
    </figure>

  </main>

</body>
</html>
